name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive package version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test -c Release --no-build --nologo

      - name: Pack
        run: dotnet pack BigRationalLibrary/BigRationalLibrary.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.version }} -o nupkgs

      - name: Push to GitHub Packages
        run: dotnet nuget push "nupkgs/*.nupkg" --source https://nuget.pkg.github.com/halheinrich/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
